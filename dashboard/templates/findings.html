{% extends "base.html" %}
{% block content %}
<h3>🚨 Findings</h3>
<table>
<tr>
  <th>Program</th>
  <th>Name</th>
  <th>Severity</th>
  <th>URL</th>
  <th>First Seen</th>
  <th>Alerted</th>
</tr>
{% for r in rows %}
<tr>
  <td>{{ r[0] }}</td>
  <td>{{ r[1] }}</td>
  <td>{{ r[2]|upper }}</td>
  <td>{{ r[3] }}</td>
  <td>{{ r[4] }}</td>
  <td>{{ r[5] if r|length > 5 else "NO" }}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
